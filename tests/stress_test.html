<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlurJS Stress Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            background: #111;
            color: #eee;
        }
        #stats {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
            border: 1px solid #444;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 10px;
        }
        .box {
            position: relative;
            width: 50px;
            height: 50px;
            background: #222;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <h1>BlurJS Stress Test</h1>
    <p>Generating 500 blurred elements to test initialization and rendering performance. Check console for detailed timing.</p>

    <div id="stats">
        Elements: <span id="count">0</span><br>
        Init Time: <span id="init-time">Pending...</span>
    </div>

    <div class="container" id="container">
        <!-- Elements will be injected here -->
    </div>

    <script>
        const container = document.getElementById('container');
        const count = 500;
        document.getElementById('count').innerText = count;

        for (let i = 0; i < count; i++) {
            const box = document.createElement('div');
            box.className = 'box';

            const blur = document.createElement('div');
            blur.className = 'blur';

            // Randomize some properties but keep many the same to test deduplication
            const color = i % 2 === 0 ? 'rgba(255, 0, 0, 0.5)' : 'rgba(0, 0, 255, 0.5)';
            blur.setAttribute('blur-background', color);
            blur.setAttribute('blur-amount', '10px');
            blur.setAttribute('blur-scale', '1.2');
            blur.setAttribute('blur-scale-duration', '2s');

            box.appendChild(blur);
            container.appendChild(box);
        }

        // Intercept console.log to display init time
        const oldLog = console.log;
        console.log = function(msg) {
            if (msg.includes('BlurJS: Processed')) {
                const time = msg.match(/in (.*)ms/)[1];
                document.getElementById('init-time').innerText = time + 'ms';
            }
            oldLog.apply(console, arguments);
        };
    </script>
    <script src="../dist/blur.js"></script>
</body>
</html>
